name: Build frontend and deploy to master

on:
  push:
    branches:
      - dev
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write      # push, release
  actions: read        # lire les actions
  checks: write        # statut des checks CI
  pull-requests: write # commenter les PR

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Prepare deployment
        run: |
          mkdir deploy
          cp -r backend/* deploy/
          cp *.md deploy/
          cp LICENSE deploy/
      
      - name: List deployment
        run: |
          cd deploy/
          find ./ -type f

      - name: Deploy to master
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: master
          publish_dir: ./deploy
          force_orphan: true