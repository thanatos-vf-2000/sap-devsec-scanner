name: 📚 Generate & Publish Documentation

on:
  push:
    branches: [dev]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
    
      - name: Install Chrome dependencies
        run: |
            sudo apt-get update
            sudo apt-get install -y \
                libnss3 \
                libatk1.0-0 \
                libatk-bridge2.0-0 \
                libcups2 \
                libxkbcommon0 \
                libxcomposite1 \
                libxdamage1 \
                libxfixes3 \
                libxrandr2 \
                libgbm1 \
                libasound2t64 \
                libpangocairo-1.0-0 \
                libgtk-3-0

      # ── 1. Install frontend deps ──
      - name: 📦 Install frontend deps
        working-directory: frontend
        run: npm install

      # ── 2. Install backend deps ──
      - name: 📦 Install backend deps
        working-directory: backend
        run: npm install

      # ── 3. Install screenshot deps ──
      - name: 📦 Install screenshot deps
        working-directory: docs
        run: npm install

      # ── 4. Frontend + Screenshots dans le même step ──
      - name: 🚀 Frontend + 📸 Screenshots
        run: |
          # Démarrer le frontend
          cd frontend
          npm run dev > /tmp/frontend.log 2>&1 &
          FRONTEND_PID=$!
          cd ..

          echo "Attente du frontend..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3001/health > /dev/null 2>&1; then
              echo "✅ Backend prêt après ${i}s"
              break
            fi
            if ! kill -0 $FRONTEND_PID 2>/dev/null; then
              echo "❌ frontend mort"
              cat /tmp/frontend.log
              exit 1
            fi
            echo "  Tentative $i/30..."
            sleep 1
          done

          # Vérification que curl a bien trouvé le frontend
          if ! curl -sf http://localhost:3001/health > /dev/null 2>&1; then
            echo "❌ frontend non disponible après 30s"
            cat /tmp/frontend.log
            exit 1
          fi

          # Screenshots
          cd docs
          node scripts/screenshots.js

          # Arrêter le backend
          kill $FRONTEND_PID 2>/dev/null || true
        env:
          NODE_ENV: production
          PORT: 3001
          APP_URL: http://localhost:5173

      # ── 5. Build VitePress ──
      - name: 🔨 Build VitePress
        working-directory: docs
        run: npm run build

      # ── 6. Déployer sur gh-pages ──
      - name: 🚢 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/.vitepress/dist
          publish_branch: gh-pages
          force_orphan: true